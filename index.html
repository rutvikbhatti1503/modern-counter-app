<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="counter-container">
        <h1 id="showCount">0</h1>
        <div class="buttons">
            <button class="btn-decrease" onclick="decreaseCount()">-</button>
            <button class="btn-reset" onclick="resetCount()">0</button>
            <button class="btn-increase" onclick="increaseCount()">+</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
